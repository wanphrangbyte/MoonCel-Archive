<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">+
    <title>Mooncel Archive | Password Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center overflow-hidden relative">
    
    <div class="absolute inset-0 z-0 bg-cover bg-center opacity-30 pointer-events-none" style="background-image: url('../../assets/eyes.jpg');"></div>
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm z-10 pointer-events-none"></div>

    <div class="relative z-20 w-full max-w-md p-8 glass-panel border border-[#ff4d6d]/30 shadow-[0_0_40px_rgba(255,77,109,0.15)] rounded-xl text-center">
        
        <h1 class="cinematic-text text-3xl font-bold mb-2 text-[#ff4d6d] tracking-wider">RESTORE LINK</h1>
        <p class="text-gray-400 text-sm mb-8" id="status-text">Enter your email to receive a recovery catalyst.</p>

        <div id="request-phase">
            <input type="email" id="recovery-email" placeholder="Master's Email Address" class="w-full bg-black/50 border border-gray-700 text-white p-3 rounded mb-6 focus:outline-none focus:border-[#ff4d6d] transition-colors text-center tracking-wider">
            
            <button onclick="requestOTP()" id="req-btn" class="glow-btn w-full py-3 rounded uppercase tracking-widest font-bold text-sm bg-transparent border border-[#ff4d6d] text-[#ff4d6d] hover:bg-[#ff4d6d] hover:text-white transition-all">
                GET OTP
            </button>
        </div>

        <div id="verify-phase" class="hidden">
            <input type="text" id="recovery-otp" placeholder="Enter 6-Digit Catalyst" class="w-full bg-black/50 border border-gray-700 text-white p-3 rounded mb-4 focus:outline-none focus:border-[#ff4d6d] text-center text-xl tracking-[0.5em] font-bold">
            
            <input type="password" id="new-password" placeholder="New Password" class="w-full bg-black/50 border border-gray-700 text-white p-3 rounded mb-6 focus:outline-none focus:border-[#ff4d6d] text-center tracking-wider">
            
            <button onclick="verifyAndReset()" class="glow-btn w-full py-3 rounded uppercase tracking-widest font-bold text-sm bg-[#ff4d6d] text-white hover:bg-red-600 transition-all shadow-[0_0_15px_rgba(255,77,109,0.5)]">
                confirm
            </button>
        </div>

        <div class="mt-6">
            <a href="login.html" class="text-xs text-gray-500 hover:text-[#ff4d6d] uppercase tracking-widest transition-colors">Return to Login</a>
        </div>
    </div>

    <div id="alert-box" class="fixed top-5 right-5 bg-black/80 border border-red-500 text-white px-6 py-3 rounded hidden z-50 transform transition-transform duration-300 translate-x-full">
        <span id="alert-msg"></span>
    </div>

    <script src="../js/recovery.js"></script>
</body>
</html>
